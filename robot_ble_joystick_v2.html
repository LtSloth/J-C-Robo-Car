
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app { max-width: 420px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: 12px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem; }
  .ble-header { display: flex; align-items: center; gap: 10px; }
  .ble-dot { width: 10px; height: 10px; border-radius: 50%; background: #888; transition: background 0.3s; flex-shrink: 0; }
  .ble-dot.connected { background: #3B6D11; }
  .ble-dot.scanning { background: #BA7517; animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
  .ble-name { font-size: 13px; color: var(--color-text-secondary); flex: 1; }
  .btn { cursor: pointer; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; padding: 6px 14px; transition: background 0.15s, transform 0.1s; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn:active { transform: scale(0.97); }
  .btn.danger { border-color: #A32D2D; color: #A32D2D; }
  .btn.danger:hover { background: #FCEBEB; }
  .section-label { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .joystick-area { display: flex; justify-content: center; align-items: center; padding: 1rem 0; }
  canvas#joystick { cursor: grab; touch-action: none; }
  canvas#joystick:active { cursor: grabbing; }
  .telemetry { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px; text-align: center; }
  .metric-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .mode-btn { padding: 16px 8px; font-size: 14px; font-weight: 500; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; transition: background 0.15s, transform 0.1s, border-color 0.15s; text-align: center; user-select: none; }
  .mode-btn:hover { background: var(--color-background-secondary); }
  .mode-btn:active { transform: scale(0.96); }
  .mode-btn.active-manual { background: #E6F1FB; border: 2px solid #185FA5; color: #185FA5; }
  .mode-btn.active-roam   { background: #EAF3DE; border: 2px solid #3B6D11; color: #3B6D11; }
  .mode-btn.active-stop   { background: #FCEBEB; border: 2px solid #A32D2D; color: #A32D2D; }
  .mode-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: var(--border-radius-md); margin-left: 8px; vertical-align: middle; }
  .badge-manual { background: #E6F1FB; color: #0C447C; }
  .badge-roam   { background: #EAF3DE; color: #27500A; }
  .badge-stop   { background: #FCEBEB; color: #791F1F; }
  .joystick-disabled { opacity: 0.4; pointer-events: none; }
  .log-box { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; max-height: 90px; overflow-y: auto; }
  .log-entry { line-height: 1.6; }
  .log-entry.ok   { color: #3B6D11; }
  .log-entry.err  { color: #A32D2D; }
  .log-entry.info { color: #185FA5; }
</style>

<div id="app">
  <h2 class="sr-only">BLE Robot Controller — Manual, Roam, and Stop modes with joystick and BLE connection to Arduino.</h2>

  <div class="card">
    <div class="ble-header">
      <div class="ble-dot" id="bleDot"></div>
      <span class="ble-name" id="bleName">Not connected</span>
      <button class="btn" id="connectBtn" onclick="bleConnect()">Connect</button>
      <button class="btn danger" id="disconnectBtn" onclick="bleDisconnect()" style="display:none">Disconnect</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Mode
      <span class="mode-badge badge-stop" id="modeBadge">Stopped</span>
    </div>
    <div class="mode-grid">
      <button class="mode-btn" id="btnManual" onclick="setMode('manual')">Manual</button>
      <button class="mode-btn" id="btnRoam"   onclick="setMode('roam')">Roam</button>
      <button class="mode-btn active-stop" id="btnStop" onclick="setMode('stop')">Stop</button>
    </div>
  </div>

  <div class="card" id="joystickCard">
    <div class="section-label">Joystick</div>
    <div class="joystick-area">
      <canvas id="joystick" width="220" height="220" class="joystick-disabled"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Telemetry</div>
    <div class="telemetry">
      <div class="metric"><div class="metric-label">X axis</div><div class="metric-value" id="metX">0</div></div>
      <div class="metric"><div class="metric-label">Y axis</div><div class="metric-value" id="metY">0</div></div>
      <div class="metric"><div class="metric-label">Speed %</div><div class="metric-value" id="metSpd">0</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Log</div>
    <div class="log-box" id="logBox">
      <div class="log-entry info">Ready. Connect then choose a mode.</div>
    </div>
  </div>
</div>

<script>
const SERVICE_UUID       = '12345678-1234-1234-1234-123456789abc';
const CHAR_JOYSTICK_UUID = '12345678-1234-1234-1234-123456789abd';
const CHAR_ACTION_UUID   = '12345678-1234-1234-1234-123456789abe';

let bleDevice=null, bleServer=null, joystickChar=null, actionChar=null, sending=false;
let currentMode = 'stop';

function log(msg, type='') {
  const box = document.getElementById('logBox');
  const d = document.createElement('div');
  d.className = 'log-entry ' + type;
  const t = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent = `[${t}] ${msg}`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  if (box.children.length > 40) box.removeChild(box.firstChild);
}

async function bleConnect() {
  if (!navigator.bluetooth) { log('Web Bluetooth not supported in this browser.','err'); return; }
  setDot('scanning'); log('Scanning for robot…','info');
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }],
      optionalServices: [SERVICE_UUID]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
    bleServer = await bleDevice.gatt.connect();
    const svc = await bleServer.getPrimaryService(SERVICE_UUID);
    joystickChar = await svc.getCharacteristic(CHAR_JOYSTICK_UUID);
    actionChar   = await svc.getCharacteristic(CHAR_ACTION_UUID);
    setDot('connected');
    document.getElementById('bleName').textContent = bleDevice.name || 'Robot';
    document.getElementById('connectBtn').style.display = 'none';
    document.getElementById('disconnectBtn').style.display = '';
    log(`Connected to ${bleDevice.name || 'Robot'}`, 'ok');
    sendMode('stop');
  } catch(e) {
    setDot('');
    log('Connection failed: ' + e.message, 'err');
  }
}

async function bleDisconnect() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
}

function onDisconnected() {
  setDot(''); joystickChar=null; actionChar=null;
  document.getElementById('bleName').textContent = 'Not connected';
  document.getElementById('connectBtn').style.display = '';
  document.getElementById('disconnectBtn').style.display = 'none';
  log('Disconnected','err');
}

function setDot(state) {
  const d = document.getElementById('bleDot');
  d.className = 'ble-dot' + (state ? ' '+state : '');
}

async function sendJoystick(x, y) {
  if (!joystickChar || sending || currentMode !== 'manual') return;
  sending = true;
  try {
    await joystickChar.writeValueWithoutResponse(new Uint8Array([x+127, y+127]));
  } catch(e) { log('Write error: '+e.message,'err'); }
  sending = false;
}

async function sendMode(mode) {
  if (!actionChar) return;
  const map = { manual: 0x01, roam: 0x02, stop: 0x00 };
  try {
    await actionChar.writeValueWithoutResponse(new Uint8Array([map[mode]]));
  } catch(e) { log('Mode send failed: '+e.message,'err'); }
}

function setMode(mode) {
  currentMode = mode;
  const btns = { manual:'btnManual', roam:'btnRoam', stop:'btnStop' };
  const activeClass = { manual:'active-manual', roam:'active-roam', stop:'active-stop' };
  const badgeClass  = { manual:'badge-manual',   roam:'badge-roam',   stop:'badge-stop' };
  const badgeText   = { manual:'Manual',          roam:'Roaming',      stop:'Stopped' };

  Object.keys(btns).forEach(m => {
    const el = document.getElementById(btns[m]);
    el.className = 'mode-btn' + (m === mode ? ' ' + activeClass[m] : '');
  });

  const badge = document.getElementById('modeBadge');
  badge.className = 'mode-badge ' + badgeClass[mode];
  badge.textContent = badgeText[mode];

  const canvas = document.getElementById('joystick');
  if (mode === 'manual') {
    canvas.classList.remove('joystick-disabled');
  } else {
    canvas.classList.add('joystick-disabled');
    updateStick(0, 0);
  }

  const modeLabels = { manual:'Manual mode — use joystick', roam:'Roam mode — robot navigates autonomously', stop:'Stopped' };
  log(modeLabels[mode], mode === 'stop' ? 'err' : mode === 'roam' ? 'ok' : 'info');
  sendMode(mode);
  drawJoystick();
}

function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

const canvas = document.getElementById('joystick');
const ctx = canvas.getContext('2d');
const CX=110, CY=110, BASE_R=90, STICK_R=30;
let stickX=0, stickY=0, dragging=false, lastSentX=0, lastSentY=0;

function drawJoystick() {
  ctx.clearRect(0,0,220,220);
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const disabled = currentMode !== 'manual';
  const baseColor  = isDark ? '#2C2C2A' : '#F1EFE8';
  const baseStroke = isDark ? '#5F5E5A' : '#B4B2A9';
  const crossColor = isDark ? '#5F5E5A' : '#D3D1C7';
  const stickFill  = disabled ? (isDark ? '#444441' : '#D3D1C7') : (isDark ? '#185FA5' : '#378ADD');
  const stickStroke= disabled ? (isDark ? '#5F5E5A' : '#B4B2A9') : (isDark ? '#85B7EB' : '#0C447C');

  ctx.beginPath(); ctx.arc(CX,CY,BASE_R,0,Math.PI*2);
  ctx.fillStyle=baseColor; ctx.fill();
  ctx.strokeStyle=baseStroke; ctx.lineWidth=1; ctx.stroke();

  ctx.strokeStyle=crossColor; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(CX-BASE_R,CY); ctx.lineTo(CX+BASE_R,CY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX,CY-BASE_R); ctx.lineTo(CX,CY+BASE_R); ctx.stroke();

  const sx=CX+stickX, sy=CY+stickY;
  ctx.beginPath(); ctx.arc(sx,sy,STICK_R,0,Math.PI*2);
  ctx.fillStyle=stickFill; ctx.fill();
  ctx.strokeStyle=stickStroke; ctx.lineWidth=1.5; ctx.stroke();
}

function stickFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX=220/rect.width, scaleY=220/rect.height;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  let dx=(cx-rect.left)*scaleX-CX, dy=(cy-rect.top)*scaleY-CY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>BASE_R-STICK_R){const s=(BASE_R-STICK_R)/dist;dx*=s;dy*=s;}
  return {dx,dy};
}

function updateStick(dx,dy) {
  stickX=dx; stickY=dy;
  const maxR=BASE_R-STICK_R;
  const nx=Math.round(dx/maxR*127), ny=Math.round(-dy/maxR*127);
  const spd=Math.round(clamp(Math.sqrt(nx*nx+ny*ny)/127*100,0,100));
  document.getElementById('metX').textContent=nx;
  document.getElementById('metY').textContent=ny;
  document.getElementById('metSpd').textContent=spd;
  if(nx!==lastSentX||ny!==lastSentY){sendJoystick(nx,ny);lastSentX=nx;lastSentY=ny;}
  drawJoystick();
}

canvas.addEventListener('mousedown',  e=>{if(currentMode!=='manual')return;dragging=true;const{dx,dy}=stickFromEvent(e);updateStick(dx,dy);});
canvas.addEventListener('mousemove',  e=>{if(!dragging)return;const{dx,dy}=stickFromEvent(e);updateStick(dx,dy);});
canvas.addEventListener('mouseup',    ()=>{dragging=false;updateStick(0,0);sendJoystick(0,0);});
canvas.addEventListener('mouseleave', ()=>{if(dragging){dragging=false;updateStick(0,0);sendJoystick(0,0);}});
canvas.addEventListener('touchstart', e=>{e.preventDefault();if(currentMode!=='manual')return;dragging=true;const{dx,dy}=stickFromEvent(e);updateStick(dx,dy);},{passive:false});
canvas.addEventListener('touchmove',  e=>{e.preventDefault();if(!dragging)return;const{dx,dy}=stickFromEvent(e);updateStick(dx,dy);},{passive:false});
canvas.addEventListener('touchend',   ()=>{dragging=false;updateStick(0,0);sendJoystick(0,0);});

drawJoystick();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', drawJoystick);
</script>
